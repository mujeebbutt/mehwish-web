<!DOCTYPE html>
<html class="scroll-smooth" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Student Login | Mehwish Online Institute</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-surface-variant": "#5a6062",
            "primary": "#00687c",
            "background": "#f8f9fa",
            "on-surface": "#2d3335",
            "outline-variant": "#adb3b5",
            "surface-container": "#ebeef0",
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Manrope"],
            "label": ["Manrope"]
          },
          borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .bg-grid-pattern { background-image: radial-gradient(#00A3C1 0.5px, transparent 0.5px); background-size: 24px 24px; opacity: 0.1; }
    .bg-blob { position: absolute; border-radius: 9999px; filter: blur(80px); z-index: -1; opacity: 0.08; background-color: #00A3C1; }
    .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
  </style>
</head>

<body class="bg-background text-on-surface font-body min-h-screen flex flex-col overflow-x-hidden">
  <div class="fixed inset-0 pointer-events-none -z-10">
    <div class="bg-blob w-[500px] h-[500px] -top-32 -left-32"></div>
    <div class="bg-blob w-[600px] h-[600px] bottom-0 -right-32"></div>
    <div class="absolute inset-0 bg-grid-pattern"></div>
  </div>

  <header class="w-full z-50 p-8 flex justify-center md:justify-start">
    <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
      <span class="material-symbols-outlined text-[#00A3C1]">arrow_back</span>
      <span class="text-xl font-extrabold text-[#00A3C1] tracking-tighter font-headline">Back to Website</span>
    </a>
  </header>

  <main class="flex-grow flex items-center justify-center px-4 py-12">
    <div class="glass-panel w-full max-w-md rounded-3xl p-10 shadow-2xl relative overflow-hidden">
      <div class="absolute top-0 left-0 w-full h-2 bg-[#00A3C1]"></div>

      <div class="text-center mb-10">
        <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4 border border-[#00A3C1]/20">
          <span class="material-symbols-outlined text-3xl text-[#00A3C1]">school</span>
        </div>
        <h1 class="font-headline text-3xl font-extrabold text-on-surface mb-2">Student Access</h1>
        <p class="text-on-surface-variant text-sm">Welcome back to your learning portal.</p>
      </div>

      <form id="login-form" class="space-y-6">
        <div>
          <label class="block text-sm font-bold text-on-surface mb-2 font-label" for="login-email">Email Address</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">mail</span>
            <input id="login-email" type="email" placeholder="student@example.com" class="w-full pl-12 pr-4 py-3 rounded-xl border border-outline-variant focus:border-[#00A3C1] focus:ring-2 focus:ring-[#00A3C1]/20 outline-none transition-all" required>
          </div>
        </div>

        <div>
          <label class="block text-sm font-bold text-on-surface mb-2 font-label" for="login-password">Password</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">lock</span>
            <input id="login-password" type="password" placeholder="••••••••" class="w-full pl-12 pr-4 py-3 rounded-xl border border-outline-variant focus:border-[#00A3C1] focus:ring-2 focus:ring-[#00A3C1]/20 outline-none transition-all" required>
          </div>
        </div>

        <button id="login-btn" type="submit" class="w-full py-4 bg-[#00A3C1] text-white rounded-full font-bold text-lg shadow-lg hover:shadow-[#00A3C1]/30 hover:translate-y-[-1px] transition-all">
          Secure Login
        </button>

        <p id="message" class="text-center text-sm font-bold mt-4 min-h-[1.25rem]"></p>
      </form>

      <div class="mt-8 text-center text-sm text-on-surface-variant border-t border-surface-container pt-6">
        <p class="mb-4">New student? <a href="enrollment.html" class="text-[#00A3C1] font-bold text-base hover:underline">Enroll Here</a></p>
        <p>Trouble logging in? <span class="text-[#00A3C1] font-bold">Contact your teacher.</span></p>
      </div>
    </div>
  </main>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";

    const loginForm = document.getElementById('login-form');
    const messageElement = document.getElementById('message');
    const loginBtn = document.getElementById('login-btn');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      // UI Loading State
      loginBtn.disabled = true;
      loginBtn.textContent = 'Verifying...';
      messageElement.style.color = '#00687c';
      messageElement.textContent = 'Checking credentials...';

      try {
        // 1. Authenticate with Firebase Auth
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // 2. Fetch the student profile with multiple collection fallback
        // Check "users" first
        let userRef = doc(db, "users", user.uid);
        let userSnap = await getDoc(userRef);

        // Check "students" if not found in users
        if (!userSnap.exists()) {
          userRef = doc(db, "students", user.uid);
          userSnap = await getDoc(userRef);
        }

        if (userSnap.exists()) {
          const userData = userSnap.data();
          
          localStorage.setItem('userRole', userData.role || 'student');
          localStorage.setItem('userName', userData.fullName || userData.name || 'Student');

          // Redirect based on role
          if (userData.role === 'admin') {
            window.location.href = 'admin/admin.html';
          } else {
            window.location.href = 'dashboard.html';
          }
        } else {
          // --- ROBUST FALLBACK ---
          // Account exists in Auth but document is missing. 
          // We let them in anyway, and the Dashboard fallback will handle the UI.
          console.warn("Auth successful but Firestore document not found.");
          localStorage.setItem('userRole', 'student');
          localStorage.setItem('userName', email.split('@')[0]); 
          window.location.href = 'dashboard.html';
        }

      } catch (error) {
        console.error('Login error details:', error.code, error.message);
        messageElement.style.color = '#a83836';
        
        // Handling specific Firebase errors
        if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
          messageElement.textContent = 'Invalid email or password. Please try again.';
        } else if (error.code === 'auth/too-many-requests') {
          messageElement.textContent = 'Too many failed attempts. Please try again later.';
        } else {
          messageElement.textContent = 'Login failed. Error: ' + error.code;
        }
        
        loginBtn.disabled = false;
        loginBtn.textContent = 'Secure Login';
      }
    });
  </script>
</body>
</html>
