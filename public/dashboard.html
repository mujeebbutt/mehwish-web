<!DOCTYPE html>
<html class="scroll-smooth" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Student Dashboard | Mehwish Online Institute</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <script src="particles.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-surface-variant": "#5a6062",
            "primary": "#00687c",
            "background": "#f8f9fa",
            "on-surface": "#2d3335",
            "outline-variant": "#adb3b5",
            "surface-container": "#ebeef0",
          },
          fontFamily: { "headline": ["Plus Jakarta Sans"], "body": ["Manrope"] },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .bg-grid-pattern { background-image: radial-gradient(#00A3C1 0.5px, transparent 0.5px); background-size: 24px 24px; opacity: 0.1; }
    .bg-blob { position: absolute; border-radius: 9999px; filter: blur(80px); z-index: -1; opacity: 0.08; background-color: #00A3C1; }
    .glass-nav { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
  </style>
</head>

<body class="bg-background text-on-surface font-body selection:bg-[#00A3C1]/20 selection:text-[#00A3C1] overflow-x-hidden min-h-screen pb-12">

  <div class="fixed inset-0 pointer-events-none -z-10">
    <div class="bg-blob w-[500px] h-[500px] -top-64 -left-32"></div>
    <div class="bg-blob w-[600px] h-[600px] top-1/2 -right-64"></div>
    <div class="absolute inset-0 bg-grid-pattern"></div>
  </div>

  <header class="fixed top-0 w-full z-50 bg-white/80 glass-nav border-b border-surface-container">
    <div class="flex justify-between items-center px-8 py-4 max-w-7xl mx-auto">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-[#00A3C1]/10 flex items-center justify-center">
          <span class="material-symbols-outlined text-[#00A3C1]">school</span>
        </div>
        <div class="text-xl font-extrabold text-[#00A3C1] tracking-tighter font-headline">Student Portal</div>
      </div>
      <button id="logout-btn" class="flex items-center gap-2 text-on-surface hover:text-[#00A3C1] font-bold text-sm transition-colors">
        <span class="material-symbols-outlined text-lg">logout</span> Logout
      </button>
    </div>
  </header>

  <main class="pt-32 max-w-7xl mx-auto px-8 grid grid-cols-1 lg:grid-cols-3 gap-8">

    <div class="lg:col-span-1 space-y-8">
      <div class="bg-white rounded-3xl p-8 shadow-sm border border-surface-container text-center relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-2 bg-[#00A3C1]"></div>
        <div class="w-24 h-24 rounded-full bg-blue-50 text-[#00A3C1] flex items-center justify-center mx-auto mb-4 border-4 border-white shadow-md">
          <span class="material-symbols-outlined text-5xl">person</span>
        </div>
        <h2 id="student-name" class="font-headline text-2xl font-extrabold mb-1">Loading...</h2>
        <p id="student-info" class="text-on-surface-variant text-sm font-medium mb-6">Connecting to database...</p>

        <div class="grid grid-cols-2 gap-4 border-t border-surface-container pt-6">
          <div>
            <p class="text-[2rem] font-black text-[#00A3C1]" id="user-grade">---</p>
            <p class="text-xs font-bold text-on-surface-variant uppercase tracking-wider">Class</p>
          </div>
          <div>
            <p class="text-[2rem] font-black text-amber-500" id="stats-pending">0</p>
            <p class="text-xs font-bold text-on-surface-variant uppercase tracking-wider">Pending Work</p>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-3xl p-8 shadow-sm border border-surface-container">
        <div class="flex items-center gap-3 mb-6">
          <span class="material-symbols-outlined text-[#00A3C1]">video_library</span>
          <h3 class="font-headline text-xl font-bold">Quick Details</h3>
        </div>
        <div class="space-y-4 text-sm">
          <div class="flex justify-between border-b pb-2"><span class="text-gray-400">Status:</span><span class="font-bold text-green-600">Active</span></div>
          <div class="flex justify-between border-b pb-2"><span class="text-gray-400">Focus:</span><span id="user-focus" class="font-bold">---</span></div>
          <div id="user-phone" class="text-center pt-2 font-bold text-primary">---</div>
        </div>
      </div>
    </div>

    <div class="lg:col-span-2 space-y-8">
      <div class="bg-white rounded-3xl p-8 shadow-sm border border-surface-container">
        <div class="flex items-center gap-3 mb-6 border-b border-surface-container pb-4">
          <span class="material-symbols-outlined text-error text-2xl">assignment_late</span>
          <h3 class="font-headline text-2xl font-bold">Assigned Work</h3>
        </div>
        <div id="assignments-container" class="space-y-4">
          <div class="animate-pulse bg-gray-50 h-32 rounded-2xl"></div>
        </div>
      </div>
    </div>

  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";

    // Firebase configuration (same as your project)
    const firebaseConfig = {
      apiKey: "AIzaSyAzIhF90avA0snSAOgCqRlKG49lRI2xTuk",
      authDomain: "mehwish-tutoring.firebaseapp.com",
      projectId: "mehwish-tutoring",
      storageBucket: "mehwish-tutoring.appspot.com",
      messagingSenderId: "163983660579",
      appId: "1:163983660579:web:3f13ba6f987db6c6ba8396"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ---------- CRITICAL FIX: Multi-collection fallback for student profile ----------
    // This solves the "Account found, but profile is missing" issue.
    // It will check both "users" collection (from signup) and "students" collection,
    // ensuring dashboard always loads student data regardless of where the document is stored.
    async function fetchStudentProfile(uid) {
      // Try "users" collection first (this matches the login script's original save location)
      let userRef = doc(db, "users", uid);
      let userSnap = await getDoc(userRef);
      
      if (userSnap.exists()) {
        return { exists: true, data: userSnap.data(), collection: "users" };
      }
      
      // Fallback: try "students" collection (if any registration uses separate collection)
      let studentRef = doc(db, "students", uid);
      let studentSnap = await getDoc(studentRef);
      if (studentSnap.exists()) {
        return { exists: true, data: studentSnap.data(), collection: "students" };
      }
      
      // If no profile found anywhere, return null
      return { exists: false, data: null };
    }

    // Universal data mapper: extracts fields with smart defaults
    function normalizeStudentData(profileData) {
      return {
        name: profileData.fullName || profileData.name || profileData.displayName || "Student",
        email: profileData.email || profileData.studentEmail || "—",
        grade: profileData.grade || profileData.classLevel || "N/A",
        classFocus: profileData.classFocus || profileData.focus || profileData.course || "General",
        phone: profileData.phone || profileData.contact || "",
        role: profileData.role || "student"
      };
    }

    // Load complete student info and update UI
    async function loadStudentData(uid, userEmailFromAuth = null) {
      const profileResult = await fetchStudentProfile(uid);
      
      if (!profileResult.exists) {
        // CRITICAL: Instead of showing error, create a minimal working session
        // This allows students who only have Firebase Auth but no Firestore doc to still access dashboard.
        console.warn("No Firestore profile document found. Using auth fallback data.");
        // Build minimal data using authentication email and fallback name
        const fallbackName = userEmailFromAuth ? userEmailFromAuth.split('@')[0] : "Learner";
        const normalized = {
          name: fallbackName,
          email: userEmailFromAuth || "student@mehwish.com",
          grade: "Pending",
          classFocus: "General",
          phone: "Update in profile",
          role: "student"
        };
        
        document.getElementById('student-name').textContent = normalized.name;
        document.getElementById('student-info').textContent = normalized.email;
        document.getElementById('user-grade').textContent = normalized.grade;
        document.getElementById('user-focus').textContent = normalized.classFocus;
        document.getElementById('user-phone').textContent = normalized.phone;
        
        // Also store minimal data in localStorage for any other pages
        localStorage.setItem('userRole', 'student');
        localStorage.setItem('userName', normalized.name);
        return;
      }
      
      const rawData = profileResult.data;
      const normalized = normalizeStudentData(rawData);
      
      // Update all UI elements
      document.getElementById('student-name').textContent = normalized.name;
      document.getElementById('student-info').textContent = normalized.email;
      document.getElementById('user-grade').textContent = normalized.grade;
      document.getElementById('user-focus').textContent = normalized.classFocus;
      document.getElementById('user-phone').textContent = normalized.phone;
      
      // Store session info for potential use elsewhere
      localStorage.setItem('userRole', normalized.role);
      localStorage.setItem('userName', normalized.name);
    }

    // Load tasks/assignments: supports both "tasks" collection (with studentId) 
    // and also assignments where student email matches (flexible structure)
    async function loadWork(uid, userEmail = null) {
      const container = document.getElementById('assignments-container');
      container.innerHTML = '<div class="animate-pulse bg-gray-50 h-32 rounded-2xl"></div>';
      
      let allTasks = [];
      
      // 1. Query tasks using studentId (most common pattern from your dashboard)
      try {
        const tasksByUidQuery = query(collection(db, "tasks"), where("studentId", "==", uid));
        const uidSnapshot = await getDocs(tasksByUidQuery);
        uidSnapshot.forEach(doc => {
          allTasks.push({ id: doc.id, ...doc.data() });
        });
      } catch (err) {
        console.warn("Error fetching tasks by studentId:", err);
      }
      
      // 2. If we have userEmail, also try to fetch assignments where studentEmail matches (legacy or alternative)
      if (userEmail) {
        try {
          const tasksByEmailQuery = query(collection(db, "tasks"), where("studentEmail", "==", userEmail));
          const emailSnapshot = await getDocs(tasksByEmailQuery);
          emailSnapshot.forEach(doc => {
            // avoid duplicates by checking id
            if (!allTasks.some(t => t.id === doc.id)) {
              allTasks.push({ id: doc.id, ...doc.data() });
            }
          });
        } catch (err) {
          console.warn("Error fetching tasks by studentEmail:", err);
        }
      }
      
      // 3. Also try "assignments" collection (some installations use this)
      try {
        const assignmentsQuery = query(collection(db, "assignments"), where("studentId", "==", uid));
        const assignSnapshot = await getDocs(assignmentsQuery);
        assignSnapshot.forEach(doc => {
          if (!allTasks.some(t => t.id === doc.id)) {
            allTasks.push({ id: doc.id, ...doc.data() });
          }
        });
      } catch (err) {
        // optional collection, ignore error
      }
      
      // Update pending count
      document.getElementById('stats-pending').textContent = allTasks.length;
      
      // Clear container and render
      container.innerHTML = '';
      
      if (allTasks.length === 0) {
        container.innerHTML = `
          <div class="p-8 text-center bg-surface-container/30 rounded-2xl border border-dashed border-outline-variant">
            <span class="material-symbols-outlined text-4xl text-outline-variant mb-2">check_circle</span>
            <p class="text-on-surface-variant font-medium">No pending assignments! ✨</p>
            <p class="text-xs text-on-surface-variant mt-1">Great job staying on top of your work.</p>
          </div>
        `;
        return;
      }
      
      // Sort tasks: maybe by dueDate or priority
      allTasks.sort((a, b) => {
        if (a.dueDate && b.dueDate) return new Date(a.dueDate) - new Date(b.dueDate);
        if (a.dueDate) return -1;
        if (b.dueDate) return 1;
        return 0;
      });
      
      // Render each assignment card
      allTasks.forEach(task => {
        const dueText = task.dueDate ? new Date(task.dueDate).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }) : 'No deadline';
        const status = task.status || 'Pending';
        const statusColor = status.toLowerCase() === 'completed' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700';
        const card = document.createElement('div');
        card.className = 'p-6 border border-surface-container rounded-2xl bg-white hover:shadow-md transition-all duration-200';
        card.innerHTML = `
          <div class="flex justify-between items-start mb-3">
            <h4 class="font-headline font-extrabold text-lg text-on-surface">${escapeHtml(task.title || 'Untitled Task')}</h4>
            <span class="px-3 py-1 ${statusColor} text-[11px] font-black rounded-full uppercase tracking-wide">${escapeHtml(status)}</span>
          </div>
          <p class="text-sm text-on-surface-variant mb-4 leading-relaxed">${escapeHtml(task.description || 'No description provided.')}</p>
          <div class="flex items-center justify-between border-t pt-4 mt-2">
            <div class="flex items-center gap-2">
              <span class="material-symbols-outlined text-sm text-outline-variant">event</span>
              <p class="text-xs font-semibold text-primary">${escapeHtml(dueText)}</p>
            </div>
            <button class="task-detail-btn bg-[#00A3C1] text-white px-5 py-2 rounded-full font-bold text-xs shadow-sm hover:shadow-md transition-all hover:bg-[#0080a0] flex items-center gap-1" data-task='${JSON.stringify(task).replace(/'/g, "&#39;")}'>
              <span class="material-symbols-outlined text-sm">visibility</span> Details
            </button>
          </div>
        `;
        container.appendChild(card);
      });
      
      // Attach event listeners to all detail buttons after rendering
      document.querySelectorAll('.task-detail-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          const taskData = JSON.parse(btn.getAttribute('data-task'));
          showTaskModal(taskData);
        });
      });
    }
    
    // Simple modal for task details (no external library, just dynamic)
    function showTaskModal(task) {
      // Remove existing modal if any
      const existingModal = document.getElementById('task-modal');
      if (existingModal) existingModal.remove();
      
      const modalBackdrop = document.createElement('div');
      modalBackdrop.id = 'task-modal';
      modalBackdrop.className = 'fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-all';
      modalBackdrop.innerHTML = `
        <div class="bg-white rounded-3xl max-w-md w-full shadow-2xl transform transition-all scale-100 border border-surface-container overflow-hidden">
          <div class="bg-[#00A3C1] h-2 w-full"></div>
          <div class="p-6">
            <div class="flex justify-between items-start mb-4">
              <h3 class="font-headline text-2xl font-extrabold text-on-surface">${escapeHtml(task.title || 'Task Details')}</h3>
              <button id="close-modal-btn" class="text-gray-400 hover:text-gray-600 transition-colors">
                <span class="material-symbols-outlined">close</span>
              </button>
            </div>
            <div class="space-y-3 text-sm">
              <p class="text-on-surface-variant"><span class="font-bold text-on-surface">Description:</span><br> ${escapeHtml(task.description || '—')}</p>
              <p><span class="font-bold text-on-surface">Status:</span> <span class="capitalize font-semibold">${escapeHtml(task.status || 'Pending')}</span></p>
              <p><span class="font-bold text-on-surface">Due Date:</span> ${task.dueDate ? new Date(task.dueDate).toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' }) : 'Not specified'}</p>
              ${task.teacherNote ? `<p><span class="font-bold text-on-surface">Teacher's Note:</span><br> ${escapeHtml(task.teacherNote)}</p>` : ''}
              ${task.resourceUrl ? `<p><span class="font-bold text-on-surface">Resource:</span> <a href="${escapeHtml(task.resourceUrl)}" target="_blank" class="text-[#00A3C1] underline">Open Link</a></p>` : ''}
            </div>
            <div class="mt-6 flex justify-end">
              <button id="close-modal-action" class="bg-surface-container text-on-surface-variant px-6 py-2 rounded-full font-bold text-sm hover:bg-outline-variant transition">Close</button>
            </div>
          </div>
        </div>
      `;
      document.body.appendChild(modalBackdrop);
      
      const closeModal = () => modalBackdrop.remove();
      modalBackdrop.querySelector('#close-modal-btn')?.addEventListener('click', closeModal);
      modalBackdrop.querySelector('#close-modal-action')?.addEventListener('click', closeModal);
      modalBackdrop.addEventListener('click', (e) => { if (e.target === modalBackdrop) closeModal(); });
    }
    
    // Helper to escape HTML to prevent injection
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
        return c;
      });
    }
    
    // Logout handler
    document.getElementById('logout-btn').addEventListener('click', async () => {
      try {
        await signOut(auth);
        window.location.href = 'login.html';
      } catch (err) {
        console.error('Logout error:', err);
        window.location.href = 'login.html';
      }
    });
    
    // On auth state changed: load dashboard with robust fallback
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const userEmail = user.email;
        // Load student profile from Firestore with multi-collection strategy + fallback
        await loadStudentData(user.uid, userEmail);
        // Load assignments/tasks using both uid and email
        await loadWork(user.uid, userEmail);
      } else {
        // No user logged in, redirect to login page
        window.location.href = 'login.html';
      }
    });
    
    // Optional: add a small style to improve responsiveness
    const style = document.createElement('style');
    style.textContent = `
      .task-detail-btn:active { transform: scale(0.97); }
      @media (max-width: 768px) {
        main { padding-left: 1rem; padding-right: 1rem; }
        .glass-nav { padding-left: 1rem; padding-right: 1rem; }
      }
    `;
    document.head.appendChild(style);
  </script>
</body>

</html>
