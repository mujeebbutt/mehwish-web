<!DOCTYPE html>
<html class="scroll-smooth" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Admin Login | Mehwish Online Institute</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-surface-variant": "#5a6062",
                        "primary": "#00687c",
                        "background": "#f8f9fa",
                        "on-surface": "#2d3335",
                        "outline-variant": "#adb3b5",
                        "surface-container": "#ebeef0",
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .bg-grid-pattern {
            background-image: radial-gradient(#00A3C1 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            opacity: 0.1;
        }

        .bg-blob {
            position: absolute;
            border-radius: 9999px;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.08;
            background-color: #00A3C1;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>

<body class="bg-background text-on-surface font-body min-h-screen flex flex-col overflow-x-hidden">
    <!-- Background Elements -->
    <div class="fixed inset-0 pointer-events-none -z-10">
        <div class="bg-blob w-[500px] h-[500px] -top-32 -left-32"></div>
        <div class="bg-blob w-[600px] h-[600px] bottom-0 -right-32"></div>
        <div class="absolute inset-0 bg-grid-pattern"></div>
    </div>

    <header class="w-full z-50 p-8 flex justify-center md:justify-start">
        <a href="../index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
            <span class="material-symbols-outlined text-[#00A3C1]">arrow_back</span>
            <span class="text-xl font-extrabold text-[#00A3C1] tracking-tighter font-headline">Back to Website</span>
        </a>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="glass-panel w-full max-w-md rounded-3xl p-10 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-[#00A3C1]"></div>

            <div class="text-center mb-10">
                <div
                    class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4 border border-[#00A3C1]/20">
                    <span class="material-symbols-outlined text-3xl text-[#00A3C1]">admin_panel_settings</span>
                </div>
                <h1 class="font-headline text-3xl font-extrabold text-on-surface mb-2">Teacher Login</h1>
                <p class="text-on-surface-variant text-sm">Secure access to the Management Portal.</p>
            </div>

            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-on-surface mb-2 font-label"
                        for="username">Username</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">person</span>
                        <input id="username" type="text" placeholder="admin" autocomplete="off"
                            class="w-full pl-12 pr-4 py-3 rounded-xl border border-outline-variant focus:border-[#00A3C1] focus:ring-2 focus:ring-[#00A3C1]/20 outline-none transition-all"
                            required>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-on-surface mb-2 font-label"
                        for="password">Password</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">lock</span>
                        <input id="password" type="password" placeholder="••••••••"
                            class="w-full pl-12 pr-4 py-3 rounded-xl border border-outline-variant focus:border-[#00A3C1] focus:ring-2 focus:ring-[#00A3C1]/20 outline-none transition-all"
                            required>
                    </div>
                </div>

                <button type="submit"
                    class="w-full py-4 bg-[#2d3335] text-white rounded-full font-bold text-lg shadow-lg hover:bg-black hover:translate-y-[-1px] transition-all">
                    Enter Dashboard
                </button>

                <p id="message" class="text-center text-sm font-bold mt-4 text-[#a83836] h-5"></p>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const messageElement = document.getElementById('message');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();

                if (response.ok) {
                    messageElement.style.color = '#00687c';
                    messageElement.textContent = "Access Granted...";
                    setTimeout(() => window.location.href = 'admin.html', 800);
                } else {
                    messageElement.style.color = '#a83836';
                    messageElement.textContent = data.message || "Invalid credentials.";
                }
            } catch (e) {
                messageElement.style.color = '#a83836';
                messageElement.textContent = "Server error. Is the backend running?";
            }
        });
    </script>
    <script src="/particles.js"></script>
</body>

</html>
